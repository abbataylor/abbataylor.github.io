<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title id="pageTitle">Case Study | AbbaSoft</title>
  <meta name="description" id="pageDesc" content="Project case study by Abba Moses — Full-Stack Developer." />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="assets/images/favicon.ico">
</head>
<body class="dark">

  <div id="preloader" class="preloader">
    <div class="loader"><div class="logo-glow">AS</div></div>
  </div>

  <div id="cursor" class="cursor"></div>
  <div id="cursor-follower" class="cursor-follower"></div>

  <header class="site-header">
    <div class="container header-inner">
      <div class="brand"><span class="brand-prefix">Welcome to </span><span class="brand-accent">AbbaSoft</span></div>
      <nav class="nav" id="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="projects.html" class="nav-link active">Projects</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
      <div class="actions">
        <button id="themeToggle" class="btn-ghost" title="Toggle theme" aria-label="Toggle theme"><i class='bx bx-moon' id="themeIcon"></i></button>
        <button id="menuToggle" class="btn-ghost mobile-only" aria-label="Open menu"><i class='bx bx-menu'></i></button>
      </div>
    </div>
  </header>

  <!-- Case study content injected here -->
  <main id="case-study-root">
    <div class="cs-not-found" id="cs-loader">
      <div class="container" style="padding:160px 0 80px;text-align:center">
        <i class='bx bx-loader-circle' style="font-size:3rem;color:var(--neon);animation:spin 1s linear infinite"></i>
        <p style="color:var(--muted);margin-top:1rem">Loading case study…</p>
      </div>
    </div>
  </main>

  <button id="scrollTop" class="scroll-top" title="Back to top"><i class='bx bx-up-arrow-alt'></i></button>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>© <span id="year"></span> AbbaSoft Technologies. All rights reserved.</div>
      <div class="footer-links">
        <a href="#" data-social="github" target="_blank" rel="noopener">GitHub</a>
        <a href="#" data-social="linkedin" target="_blank" rel="noopener">LinkedIn</a>
        <a href="mailto:mosesmbularinaabba@gmail.com">Email</a>
      </div>
    </div>
  </footer>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="assets/vendor/aos.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/portfolio-init.js"></script>
  <script src="assets/js/main.js"></script>

  <script>
  (function renderCaseStudy() {
    const params  = new URLSearchParams(window.location.search);
    const id      = params.get('id');
    const project = (typeof PORTFOLIO !== 'undefined' && PORTFOLIO.projects)
      ? PORTFOLIO.projects.find(p => p.id === id)
      : null;

    if (!project) {
      document.getElementById('cs-loader').innerHTML = `
        <div class="container" style="padding:160px 0 80px;text-align:center">
          <i class='bx bx-error-circle' style="font-size:3rem;color:#ff6b6b"></i>
          <h2 style="margin-top:1rem">Project Not Found</h2>
          <p style="color:var(--muted);margin:0.5rem 0 2rem">We couldn't find a project with that ID.</p>
          <a href="projects.html" class="btn btn-primary"><i class='bx bx-arrow-back'></i> Back to Projects</a>
        </div>`;
      return;
    }

    document.title = project.title + ' — Case Study | AbbaSoft';
    document.getElementById('pageTitle').textContent = project.title + ' — Case Study | AbbaSoft';
    document.getElementById('pageDesc').setAttribute('content', project.shortDesc);

    const heroImg = project.image
      ? `<img src="${project.image}" alt="${project.title}" class="cs-hero-img">`
      : `<div class="cs-hero-placeholder proj-cat-${project.category}"><i class='bx ${_catIcon(project.category)}'></i></div>`;

    const privateBadge = project.isPrivate
      ? `<span class="proj-badge badge-private"><i class='bx bx-lock-alt'></i> Private Repository</span>`
      : `<span class="proj-badge badge-public"><i class='bx bxl-github'></i> Open Source</span>`;

    const statusClass = project.status === 'Live' ? 'badge-live' : (project.status === 'In Progress' ? 'badge-wip' : 'badge-done');
    const statusBadge = `<span class="proj-badge ${statusClass}">${project.status}</span>`;

    const links = [
      project.liveDemo ? `<a href="${project.liveDemo}" class="btn btn-primary" target="_blank" rel="noopener"><i class='bx bx-link-external'></i> Live Demo</a>` : '',
      (!project.isPrivate && project.github) ? `<a href="${project.github}" class="btn btn-outline" target="_blank" rel="noopener"><i class='bx bxl-github'></i> View on GitHub</a>` : '',
    ].filter(Boolean).join('');

    const features = project.features.map(f => `<li><i class='bx bx-check-circle'></i> ${f}</li>`).join('');
    const techTags = project.technologies.map(t => `<span class="tag">${t}</span>`).join('');

    const screenshots = (project.screenshots || []).filter(Boolean);
    const galleryHtml = screenshots.length ? `
      <div class="cs-gallery-section">
        <div class="container">
          <h3 class="cs-gallery-title"><i class='bx bx-images'></i> Screenshots</h3>
          <div class="cs-gallery">
            ${screenshots.map((src, i) => `
              <div class="cs-gallery-item" onclick="openLightbox(${i})">
                <img src="${src}" alt="${project.title} screenshot ${i + 1}" loading="lazy">
                <div class="cs-gallery-overlay"><i class='bx bx-zoom-in'></i></div>
              </div>`).join('')}
          </div>
        </div>
      </div>
      <!-- Lightbox -->
      <div class="cs-lightbox" id="cs-lightbox" onclick="closeLightbox()">
        <button class="cs-lb-close" onclick="closeLightbox()"><i class='bx bx-x'></i></button>
        <button class="cs-lb-prev" onclick="event.stopPropagation();lbNav(-1)"><i class='bx bx-chevron-left'></i></button>
        <img id="cs-lb-img" src="" alt="Screenshot">
        <button class="cs-lb-next" onclick="event.stopPropagation();lbNav(1)"><i class='bx bx-chevron-right'></i></button>
      </div>` : '';

    document.getElementById('case-study-root').innerHTML = `
      <!-- Hero -->
      <div class="cs-page-hero">
        <div class="container">
          <a href="projects.html" class="cs-back" data-aos="fade-right"><i class='bx bx-arrow-back'></i> All Projects</a>
          <div class="cs-hero-inner" data-aos="fade-up">
            ${heroImg}
            <div class="cs-hero-meta">
              <div class="proj-badges">${privateBadge}${statusBadge}</div>
              <h1 class="cs-title">${project.title}</h1>
              <p class="cs-subtitle">${project.subtitle}</p>
              <p class="cs-lead">${project.shortDesc}</p>
              <div class="project-tags" style="margin:1.2rem 0">${techTags}</div>
              <div class="cs-hero-links">${links || '<span style="color:var(--muted);font-size:0.9rem"><i class=\'bx bx-lock-alt\'></i> Source code is private</span>'}</div>
            </div>
          </div>
        </div>
      </div>

      ${galleryHtml}

      <!-- Body -->
      <div class="cs-body">
        <div class="container cs-grid">

          <!-- Main content -->
          <div class="cs-main">

            <div class="cs-section" data-aos="fade-up">
              <h2><span class="cs-number">01</span> Overview</h2>
              <p>${project.overview}</p>
            </div>

            <div class="cs-section" data-aos="fade-up">
              <h2><span class="cs-number">02</span> Problem</h2>
              <p>${project.problem}</p>
            </div>

            <div class="cs-section" data-aos="fade-up">
              <h2><span class="cs-number">03</span> Solution</h2>
              <p>${project.solution}</p>
            </div>

            <div class="cs-section" data-aos="fade-up">
              <h2><span class="cs-number">04</span> Features</h2>
              <ul class="cs-features">${features}</ul>
            </div>

            <div class="cs-section" data-aos="fade-up">
              <h2><span class="cs-number">05</span> Challenges</h2>
              <p>${project.challenges}</p>
            </div>

            <div class="cs-section" data-aos="fade-up">
              <h2><span class="cs-number">06</span> Solutions Implemented</h2>
              <p>${project.solutions_implemented}</p>
            </div>

            <div class="cs-section cs-future" data-aos="fade-up">
              <h2><span class="cs-number">07</span> Future Improvements</h2>
              <p>${project.future}</p>
            </div>

          </div>

          <!-- Sidebar -->
          <aside class="cs-sidebar" data-aos="fade-left">

            <div class="cs-info-card">
              <h4>Project Info</h4>
              <div class="cs-info-row"><span>Category</span><span class="cs-info-val">${_catLabel(project.category)}</span></div>
              <div class="cs-info-row"><span>Status</span><span class="cs-info-val">${project.status}</span></div>
              <div class="cs-info-row"><span>Visibility</span><span class="cs-info-val">${project.isPrivate ? 'Private' : 'Open Source'}</span></div>
            </div>

            <div class="cs-info-card" style="margin-top:1.2rem">
              <h4>Tech Stack</h4>
              <div class="project-tags" style="gap:8px;margin-top:0.8rem">${techTags}</div>
            </div>

            <div class="cs-cta" style="margin-top:1.5rem">
              <p style="color:var(--muted);font-size:0.88rem;margin-bottom:1rem">Interested in a similar project?</p>
              <a href="contact.html" class="btn btn-primary" style="width:100%;justify-content:center"><i class='bx bx-envelope'></i> Get in Touch</a>
            </div>

          </aside>

        </div>

        <!-- More projects -->
        <div class="container cs-more" data-aos="fade-up">
          <h3>More Projects</h3>
          <div class="cs-more-grid" id="cs-more-grid"></div>
        </div>

      </div>`;

    // Render "more projects" — 3 random others
    const others = PORTFOLIO.projects.filter(p => p.id !== project.id).slice(0, 3);
    document.getElementById('cs-more-grid').innerHTML = others.map(p => `
      <a href="project-detail.html?id=${p.id}" class="cs-more-card">
        ${p.image ? `<img src="${p.image}" alt="${p.title}" loading="lazy">` : `<div class="proj-placeholder proj-cat-${p.category}" style="height:120px"><i class='bx ${_catIcon(p.category)}'></i></div>`}
        <div class="cs-more-info">
          <strong>${p.title}</strong>
          <span>${p.subtitle}</span>
        </div>
      </a>`).join('');
  })();

  // Screenshot lightbox
  let _lbIndex = 0;
  let _lbImages = [];
  window.openLightbox = function(i) {
    const lb = document.getElementById('cs-lightbox');
    if (!lb) return;
    _lbImages = Array.from(document.querySelectorAll('.cs-gallery-item img')).map(img => img.src);
    _lbIndex = i;
    document.getElementById('cs-lb-img').src = _lbImages[_lbIndex];
    lb.classList.add('active');
    document.body.style.overflow = 'hidden';
  };
  window.closeLightbox = function() {
    const lb = document.getElementById('cs-lightbox');
    if (lb) lb.classList.remove('active');
    document.body.style.overflow = '';
  };
  window.lbNav = function(dir) {
    _lbIndex = (_lbIndex + dir + _lbImages.length) % _lbImages.length;
    document.getElementById('cs-lb-img').src = _lbImages[_lbIndex];
  };
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') window.closeLightbox();
    if (e.key === 'ArrowRight') window.lbNav(1);
    if (e.key === 'ArrowLeft') window.lbNav(-1);
  });

  function _catIcon(cat) {
    const m = { system:'bx-cog', webdev:'bx-code-alt', design:'bx-palette', data:'bx-bar-chart-alt-2', frontend:'bx-window-alt' };
    return m[cat] || 'bx-code-block';
  }
  function _catLabel(cat) {
    const m = { system:'System / Platform', webdev:'Web Development', design:'Design / Branding', data:'Data & Analytics', frontend:'Frontend Component' };
    return m[cat] || cat;
  }
  </script>
</body>
</html>
